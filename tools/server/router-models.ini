version = 1

[*]
; Shared defaults across model instances.
n-gpu-layers = all
parallel = 1
batch-size = 1024
ubatch-size = 256
flash-attn = true
cache-type-k = q4_0
cache-type-v = q8_0

[gemma4-4b-instruct]
; Checked-in reference defaults. docker-compose.proxy.yml renders these from .env
; at runtime, so edit tools/server/.env to change per-model settings.
hf-repo = ggml-org/gemma-4-E4B-it-GGUF:Q4_K_M
ctx-size = 131072
batch-size = 2048
ubatch-size = 512
threads = 6
threads-batch = 12
cache-type-k = q4_0
cache-type-v = q4_0
load-on-startup = false

[mistral-nemo-12b-instruct]
; Q2_K is the default 8 GB-friendly Nemo quant for this profile.
hf-repo = bartowski/Mistral-Nemo-Instruct-2407-GGUF:Q2_K
ctx-size = 32768
load-on-startup = false

[qwen-coder-7b-instruct]
; Use bartowski here because the ggml-org line currently exposes Q8_0 for this
; model. Qwen's HF card advertises 131072 tokens, but its default config is
; 32768 unless YaRN is enabled, so 32k is the safe default here.
hf-repo = bartowski/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M
ctx-size = 32768
load-on-startup = false
