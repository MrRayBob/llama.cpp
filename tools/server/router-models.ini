version = 1

[*]
; Shared defaults across model instances.
n-gpu-layers = all
parallel = 1
batch-size = 1024
ubatch-size = 256
flash-attn = true

[gemma4-4b-instruct]
; Gemma 4 downloads its mmproj companion automatically when present.
hf-repo = ggml-org/gemma-4-E4B-it-GGUF:Q4_K_M
ctx-size = 16384
load-on-startup = false

[mistral-nemo-12b-instruct]
; Q2_K is the default 8 GB-friendly Nemo quant for this profile.
hf-repo = bartowski/Mistral-Nemo-Instruct-2407-GGUF:Q2_K
ctx-size = 32768
load-on-startup = false

[qwen-coder-7b-instruct]
; Use bartowski here because the ggml-org line currently exposes Q8_0 for this model.
hf-repo = bartowski/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M
ctx-size = 16384
load-on-startup = false
