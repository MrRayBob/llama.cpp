name: llama-gemma64-fast

x-llama-image: &llama-image
  image: local/llama.cpp:server-cuda
  build:
    context: ../..
    dockerfile: .devops/cuda.Dockerfile
    target: server

services:
  backend:
    <<: *llama-image
    container_name: llama-gemma64-backend
    restart: unless-stopped
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    entrypoint: ["/app/llama-server"]
    command:
      - --host
      - 0.0.0.0
      - --hf-repo
      - ggml-org/gemma-4-E4B-it-GGUF:Q4_K_M
      - --alias
      - gemma4-4b-instruct
      - --ctx-size
      - "${CTX_SIZE:-65536}"
      - --sleep-idle-seconds
      - "${SLEEP_IDLE_SECONDS:-1800}"
      - -fa
      - on
      - -fit
      - "${FIT_MODE:-on}"
      - -fitt
      - "${FIT_TARGET_MIB:-128}"
      - -ngl
      - "${N_GPU_LAYERS:-all}"
      - -np
      - "${N_PARALLEL:-1}"
      - -b
      - "${N_BATCH:-2048}"
      - -ub
      - "${N_UBATCH:-512}"
      - -t
      - "${THREADS:-6}"
      - -tb
      - "${THREADS_BATCH:-12}"
      - --context-shift
      - -ctk
      - ${KV_CACHE_K_TYPE:-q4_0}
      - -ctv
      - ${KV_CACHE_V_TYPE:-q4_0}
    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15m

  proxy:
    <<: *llama-image
    container_name: llama-gemma64-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["/app/llama-server-proxy"]
    command:
      - --host
      - 0.0.0.0
      - --backend-base-url
      - http://backend:8080
      - --api-key
      - ${PUBLIC_API_KEY}
      - --hard-prompt-cap
      - "${HARD_PROMPT_CAP:-62000}"
      - --compaction-trigger
      - "${COMPACTION_TRIGGER:-48000}"
    ports:
      - "${TS_IP:-127.0.0.1}:${HOST_PORT:-8082}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
