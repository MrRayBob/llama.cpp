version = 1

[*]
; shared defaults across model instances
n-gpu-layers = all
parallel = 1
batch-size = 1024
ubatch-size = 256
flash-attn = true

[minstrel-12b-instruct]
; if this id is not in cache, set a local `model = /models/...gguf` path instead
hf-repo = ggml-org/Ministral-12B-Instruct-2410-GGUF:Q4_K_M
alias = minstrel-12b-instruct
ctx-size = 40000
load-on-startup = false

[qncoder-7b-instruct]
; update to your preferred quant if needed
hf-repo = ggml-org/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M
alias = qncoder-7b-instruct
ctx-size = 16384
load-on-startup = false
