name: llama-server-proxy

x-llama-image: &llama-image
  image: local/llama.cpp:server-cuda
  build:
    context: ../..
    dockerfile: .devops/cuda.Dockerfile
    target: server

services:
  backend:
    <<: *llama-image
    container_name: llama-command-r7b-backend
    restart: unless-stopped
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    entrypoint: ["/app/llama-server"]
    command:
      - -hf
      - ${LLAMA_HF_MODEL:-bartowski/c4ai-command-r7b-12-2024-GGUF:Q4_K_M}
      - --chat-template-file
      - /config/command-r7b-tool_use.jinja
      - -a
      - ${MODEL_ALIAS:-command-r7b}
      - -fa
      - on
      - -c
      - "${BACKEND_CTX_SIZE:-8192}"
      - --context-shift
      - -ctk
      - ${BACKEND_CTK:-q8_0}
      - -ctv
      - ${BACKEND_CTV:-q8_0}
      - --host
      - 0.0.0.0
    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
      - ${TEMPLATE_FILE}:/config/command-r7b-tool_use.jinja:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  proxy:
    <<: *llama-image
    container_name: llama-command-r7b-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["/app/llama-server-proxy"]
    command:
      - --host
      - 0.0.0.0
      - --backend-base-url
      - http://backend:8080
      - --api-key
      - ${PUBLIC_API_KEY}
    ports:
      - "${TS_IP:-127.0.0.1}:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
