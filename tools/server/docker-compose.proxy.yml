name: llama-server-proxy

x-llama-image: &llama-image
  image: local/llama.cpp:server-cuda
  build:
    context: ../..
    dockerfile: .devops/cuda.Dockerfile
    target: server

services:
  backend:
    <<: *llama-image
    container_name: llama-router-backend
    restart: unless-stopped
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    entrypoint: ["/app/llama-server"]
    command:
      - --host
      - 0.0.0.0
      - --models-preset
      - /config/models.ini
      - --models-max
      - "${MODELS_MAX:-1}"
      - --sleep-idle-seconds
      - "${SLEEP_IDLE_SECONDS:-1800}"
      - -fa
      - on
      - -fit
      - "${FIT_MODE:-on}"
      - -fitt
      - "${FIT_TARGET_MIB:-256}"
      - -ngl
      - "${N_GPU_LAYERS:-all}"
      - -np
      - "${N_PARALLEL:-1}"
      - -b
      - "${N_BATCH:-1024}"
      - -ub
      - "${N_UBATCH:-256}"
      - --context-shift
      - -ctk
      - ${KV_CACHE_K_TYPE:-q4_0}
      - -ctv
      - ${KV_CACHE_V_TYPE:-q8_0}
    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
      - ./router-models.ini:/config/models.ini:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15m

  proxy:
    <<: *llama-image
    container_name: llama-router-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["/app/llama-server-proxy"]
    command:
      - --host
      - 0.0.0.0
      - --backend-base-url
      - http://backend:8080
      - --api-key
      - ${PUBLIC_API_KEY}
      - --hard-prompt-cap
      - "${HARD_PROMPT_CAP:-32000}"
      - --compaction-trigger
      - "${COMPACTION_TRIGGER:-24000}"
    ports:
      - "${TS_IP:-127.0.0.1}:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
