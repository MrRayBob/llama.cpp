name: llama-server-proxy

x-llama-image: &llama-image
  image: local/llama.cpp:server-cuda
  build:
    context: ../..
    dockerfile: .devops/cuda.Dockerfile
    target: server

services:
  backend:
    <<: *llama-image
    container_name: llama-router-backend
    restart: unless-stopped
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    entrypoint: ["/bin/sh", "/config/render-router-models.sh", "/app/llama-server"]
    command:
      - --host
      - 0.0.0.0
      - --models-preset
      - /tmp/router-models.ini
      - --models-max
      - "${MODELS_MAX:-1}"
      - --sleep-idle-seconds
      - "${SLEEP_IDLE_SECONDS:-1800}"
      - -fit
      - "${FIT_MODE:-on}"
      - -fitt
      - "${FIT_TARGET_MIB:-256}"
      - --context-shift
    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
      - ./render-router-models.sh:/config/render-router-models.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15m

  proxy:
    <<: *llama-image
    container_name: llama-router-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["/app/llama-server-proxy"]
    command:
      - --host
      - 0.0.0.0
      - --backend-base-url
      - http://backend:8080
      - --api-key
      - ${PUBLIC_API_KEY}
      - --hard-prompt-cap
      - "${DEFAULT_HARD_PROMPT_CAP:-32000}"
      - --compaction-trigger
      - "${DEFAULT_COMPACTION_TRIGGER:-24000}"
      - --model-hard-prompt-cap
      - "gemma4-4b-instruct=${GEMMA4_HARD_PROMPT_CAP:-0}"
      - --model-compaction-trigger
      - "gemma4-4b-instruct=${GEMMA4_COMPACTION_TRIGGER:-0}"
      - --model-hard-prompt-cap
      - "mistral-nemo-12b-instruct=${MISTRAL_NEMO_HARD_PROMPT_CAP:-32000}"
      - --model-compaction-trigger
      - "mistral-nemo-12b-instruct=${MISTRAL_NEMO_COMPACTION_TRIGGER:-24000}"
      - --model-hard-prompt-cap
      - "qwen-coder-7b-instruct=${QWEN_CODER_HARD_PROMPT_CAP:-32000}"
      - --model-compaction-trigger
      - "qwen-coder-7b-instruct=${QWEN_CODER_COMPACTION_TRIGGER:-24000}"
    ports:
      - "${TS_IP:-127.0.0.1}:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
