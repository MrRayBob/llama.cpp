name: llama-server-proxy

x-llama-image: &llama-image
  image: local/llama.cpp:server-cuda
  build:
    context: ../..
    dockerfile: .devops/cuda.Dockerfile
    target: server

services:
  backend:
    <<: *llama-image
    container_name: llama-nemo-backend
    restart: unless-stopped
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    entrypoint: ["/app/llama-server"]
    command:
      - -hf
      - ${LLAMA_HF_MODEL:-bartowski/Mistral-Nemo-Instruct-2407-GGUF:IQ3_M}
      - -a
      - ${MODEL_ALIAS:-mistral-nemo-32k}
      - -fa
      - on
      - -c
      - "${BACKEND_CTX_SIZE:-32768}"
      - --context-shift
      - -ctk
      - ${BACKEND_CTK:-pq3_5}
      - -ctv
      - ${BACKEND_CTV:-q8_0}
      - --host
      - 0.0.0.0
    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  proxy:
    <<: *llama-image
    container_name: llama-nemo-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["/app/llama-server-proxy"]
    command:
      - --host
      - 0.0.0.0
      - --backend-base-url
      - http://backend:8080
      - --api-key
      - ${PUBLIC_API_KEY}
    ports:
      - "${TS_IP:-127.0.0.1}:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
